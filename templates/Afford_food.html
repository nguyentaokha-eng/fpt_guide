{% extends "base.html" %}
{% load static %}
{% block content %}

<!-- ================= PREMIUM BACKGROUND ================= -->
<div class="premium-bg">
    <div class="mesh-layer"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="vignette"></div>
</div>

<style>
    body {
        background: linear-gradient(145deg, #f5f7ff 0%, #ede8ff 35%, #f8f0ff 65%, #e8f4ff 100%) !important;
    }
    .navbar {
    background: transparent !important;
}
    
/* ============================================================
   PREMIUM UNIVERSITY BACKGROUND
   ============================================================ */
.premium-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: linear-gradient(145deg, #f5f7ff 0%, #ede8ff 35%, #f8f0ff 65%, #e8f4ff 100%);
}
.mesh-layer {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
}
.shape { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.4; }
.shape-1 { width: 400px; height: 400px; background: #b4a5ff; top: -100px; left: -100px; animation: float 20s ease-in-out infinite; }
.shape-2 { width: 300px; height: 300px; background: #7db8ff; bottom: -50px; right: -50px; animation: float 25s ease-in-out infinite reverse; }
.shape-3 { width: 200px; height: 200px; background: #d4b8ff; top: 50%; right: 20%; animation: float 18s ease-in-out infinite; }
.shape-4 { width: 150px; height: 150px; background: #a8d4ff; bottom: 20%; left: 10%; animation: float 22s ease-in-out infinite reverse; }
.vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.05) 100%); }
@keyframes float { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(10px, 10px); } 50% { transform: translate(0, 20px); } 75% { transform: translate(-10px, 10px); } }

    /* ===== BASE STYLES ===== */
    body { background: transparent; color: #1f2937; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* ===== PIXEL TITLE ===== */
    .pixel-title {
        font-family: "Press Start 2P", monospace;
        text-align: center;
        font-size: 24px;
        margin-bottom: 30px;
    }

    /* ===== SEARCH BOX ===== */
    .search-section {
        max-width: 600px;
        margin: 0 auto 40px;
    }
    .search-box {
        position: relative;
    }
    .search-box input {
        width: 100%;
        padding: 16px 20px;
        font-size: 16px;
        border: 3px solid #000;
        border-radius: 8px;
        box-shadow: 4px 4px 0 #000;
        outline: none;
    }
    .search-box input:focus {
        box-shadow: 6px 6px 0 #6f42c1;
    }

    /* ===== RESTAURANT GRID ===== */
    .restaurant-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
    }

    .restaurant-card {
        background: #fff;
        border: 3px solid #000;
        border-radius: 12px;
        box-shadow: 6px 6px 0 #000;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        color: inherit;
    }
    .restaurant-card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 #000;
    }
    .restaurant-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }
    .restaurant-info {
        padding: 16px;
    }
    .restaurant-name {
        font-family: monospace;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 8px;
    }
    .restaurant-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
    }
    .tag-badge {
        padding: 4px 8px;
        background: #e5e7eb;
        border: 2px solid #000;
        font-size: 11px;
        font-weight: bold;
    }
    .tag-badge.purple { background: #6f42c1; color: white; }
    .tag-badge.orange { background: #f59e0b; color: white; }
    .restaurant-rating {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 2px solid #000;
        font-size: 13px;
        font-weight: bold;
    }
    .rating-stars {
        color: #f59e0b;
    }

    /* ===== OVERLAY/MODAL ===== */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
    }
    .modal-overlay.active {
        display: flex;
    }

    .modal-content {
        background: #fff;
        border: 4px solid #000;
        border-radius: 16px;
        box-shadow: 8px 8px 0 #000;
        max-width: 1100px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-header {
        background: linear-gradient(to right, #6f42c1, #9333ea);
        color: white;
        padding: 24px;
    }
    .modal-header h2 {
        font-family: monospace;
        font-size: 24px;
        margin-bottom: 8px;
    }
    .modal-header a {
        color: white;
        text-decoration: underline;
    }
    .modal-close {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        background: rgba(0,0,0,0.3);
        border: 2px solid #fff;
        border-radius: 50%;
        color: white;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .modal-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        padding: 24px;
    }
    @media (max-width: 768px) {
        .modal-body { grid-template-columns: 1fr; }
    }

    .detail-section h3 {
        font-family: monospace;
        font-size: 16px;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 2px solid #000;
    }

    /* ===== IMAGES ===== */
    .main-image {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border: 3px solid #000;
        border-radius: 12px;
        margin-bottom: 12px;
    }
    .gallery {
        display: flex;
        gap: 10px;
        overflow-x: auto;
    }
    .gallery img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border: 2px solid #000;
        border-radius: 8px;
        cursor: pointer;
        flex-shrink: 0;
    }
    .gallery img:hover {
        border-color: #6f42c1;
    }

    /* ===== SCORES ===== */
    .scores-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 20px;
    }
    .score-item {
        background: #f3f4f6;
        border: 2px solid #000;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
    }
    .score-label {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 4px;
    }
    .score-value {
        font-family: "Press Start 2P", monospace;
        font-size: 20px;
        font-weight: bold;
        color: #6f42c1;
    }
    .overall-score {
        background: #6f42c1;
        color: white;
        border: 3px solid #000;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        margin-bottom: 20px;
    }
    .overall-score .label {
        font-size: 12px;
        margin-bottom: 4px;
    }
    .overall-score .value {
        font-family: "Press Start 2P", monospace;
        font-size: 36px;
    }

    /* ===== COMMENTS ===== */
    .comments-list {
        max-height: 400px;
        overflow-y: auto;
    }
    .comment-item {
        background: #f9fafb;
        border: 2px solid #000;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
    }
    .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .comment-user {
        font-weight: bold;
        font-family: monospace;
    }
    .comment-date {
        font-size: 12px;
        color: #9ca3af;
    }
    .comment-content {
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 8px;
    }
    .comment-scores {
        display: flex;
        gap: 12px;
        font-size: 11px;
    }
    .comment-score {
        background: #e5e7eb;
        padding: 4px 8px;
        border-radius: 4px;
    }
    .comment-images {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
    }
    .comment-images img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border: 2px solid #000;
        border-radius: 6px;
        cursor: pointer;
    }

    /* ===== REVIEW FORM ===== */
    .review-form {
        margin-top: 20px;
        padding: 20px;
        background: #f9fafb;
        border: 3px solid #000;
        border-radius: 12px;
        display: none;
    }
    .review-form.active {
        display: block;
    }
    .review-form h4 {
        font-family: monospace;
        margin-bottom: 16px;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
    }
    .form-group input[type="text"],
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #000;
        border-radius: 6px;
        font-family: monospace;
    }
    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }
    
    .slider-group {
        margin-bottom: 16px;
    }
    .slider-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }
    .slider-value {
        font-family: "Press Start 2P", monospace;
        font-weight: bold;
        color: #6f42c1;
    }
    .slider-group input[type="range"] {
        width: 100%;
        height: 8px;
        border: 2px solid #000;
        border-radius: 4px;
        appearance: none;
        background: #e5e7eb;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 20px;
        height: 20px;
        background: #6f42c1;
        border: 2px solid #000;
        border-radius: 4px;
        cursor: pointer;
    }
    
    .submit-btn {
        width: 100%;
        padding: 14px;
        background: #6f42c1;
        color: white;
        border: 3px solid #000;
        border-radius: 8px;
        font-family: monospace;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 4px 4px 0 #000;
        transition: all 0.2s;
    }
    .submit-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 #000;
    }

    .toggle-form-btn {
        width: 100%;
        padding: 14px;
        background: #f3f4f6;
        color: #1f2937;
        border: 3px solid #000;
        border-radius: 8px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 4px 4px 0 #000;
        transition: all 0.2s;
        margin-top: 16px;
    }
    .toggle-form-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 #000;
    }

    /* ===== ZOOM ===== */
    .zoom-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }
    .zoom-overlay.active {
        display: flex;
    }
    .zoom-overlay img {
        max-width: 90%;
        max-height: 90%;
        border: 3px solid #fff;
    }
</style>

<div class="container">
    <h1 class="pixel-title">🍜 ĂN UỐNG QUANH ĐH FPT</h1>

    <!-- SEARCH -->
    <div class="search-section">
        <div class="search-box">
            <input id="search" placeholder="Tìm quán ăn... (VD: cơm rẻ, cafe, trà sữa)">
        </div>
    </div>

    <!-- RESTAURANT LIST -->
    <div class="restaurant-grid" id="restaurantList"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2 id="dName"></h2>
            <a id="dMap" target="_blank">📍 Xem trên Google Maps</a>
        </div>
        
        <div class="modal-body">
            <!-- LEFT: Info & Images -->
            <div class="detail-section">
                <h3>📸 Hình ảnh</h3>
                <img id="dMain" class="main-image">
                <div class="gallery" id="dGallery"></div>

                <h3 style="margin-top: 20px">📊 Đánh giá</h3>
                <div class="overall-score">
                    <div class="label">Điểm tổng hợp</div>
                    <div class="value" id="dOverall"></div>
                </div>
                
                <div class="scores-grid">
                    <div class="score-item">
                        <div class="score-label">Giá</div>
                        <div class="score-value" id="sPrice"></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">Chất lượng</div>
                        <div class="score-value" id="sQuality"></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">Phục vụ</div>
                        <div class="score-value" id="sService"></div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">Không gian</div>
                        <div class="score-value" id="sSpace"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Comments & Form -->
            <div class="detail-section">
                <h3>💬 Bình luận (<span id="commentCount">0</span>)</h3>
                
                <div class="comments-list" id="commentList">
                    <p style="color: #9ca3af; text-align: center;">Chưa có bình luận nào</p>
                </div>

                <button class="toggle-form-btn" onclick="toggleReviewForm()">
                    ✏️ Viết bình luận
                </button>

                <!-- REVIEW FORM -->
                <div class="review-form" id="reviewForm">
                    <h4>Thêm bình luận mới</h4>
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Tên của bạn</label>
                        <input type="text" id="cName" placeholder="Nhập tên hoặc ẩn danh">
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Giá 💰</label>
                            <span class="slider-value" id="sliderPrice">5</span>
                        </div>
                        <input type="range" id="cPrice" min="0" max="10" value="5" oninput="updateSlider('Price')">
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Chất lượng 🍽️</label>
                            <span class="slider-value" id="sliderQuality">5</span>
                        </div>
                        <input type="range" id="cQuality" min="0" max="10" value="5" oninput="updateSlider('Quality')">
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Phục vụ 👨‍🍳</label>
                            <span class="slider-value" id="sliderService">5</span>
                        </div>
                        <input type="range" id="cService" min="0" max="10" value="5" oninput="updateSlider('Service')">
                    </div>
                    
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>Không gian 🏠</label>
                            <span class="slider-value" id="sliderSpace">5</span>
                        </div>
                        <input type="range" id="cSpace" min="0" max="10" value="5" oninput="updateSlider('Space')">
                    </div>
                    
                    <div class="form-group">
                        <label>Nội dung bình luận</label>
                        <textarea id="cText" placeholder="Chia sẻ trải nghiệm của bạn..." rows="4"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Ảnh đính kèm (có thể chọn nhiều)</label>
                        <input type="file" id="cImages" multiple accept="image/*">
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="cAnon"> Ẩn danh
                        </label>
                    </div>
                    
                    <button class="submit-btn" onclick="submitComment()">📤 Gửi bình luận</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ZOOM IMAGE -->
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
    <img id="zoomImg">
</div>

const STATIC_URL = "{% static '' %}";
let currentPlaceId = null;

// Load places from backend API
async function loadPlacesFromAPI() {
    try {
        const response = await fetch('/api/places/');
        if (response.ok) {
            const data = await response.json();
            if (data.length > 0) {
                backendPlaces = data;
                return true;
            }
        }
    } catch (e) {
        console.log('Using static data (API not available)');
    }
    return false;
}

// Convert backend place data to display format
function convertPlaceData(place) {
    // Use place ID for image number (e.g., id 1 = food/1.jpg, id 25 = food/25.jpg)
    const imgNum = place.id || 1;
    // Try to get map from backend, otherwise fall back to SAMPLE_DATA
    const samplePlace = SAMPLE_DATA.find(s => s.id === place.id);
    const mapUrl = place.map || (samplePlace ? samplePlace.map : "https://maps.google.com");
    return {
        id: place.id,
        name: place.name,
        map: mapUrl,
        tags: place.tags || ["Ăn uống", "FPT"],
        keywords: place.keywords || ["food", place.name.toLowerCase()],
        photos: {
            place: [STATIC_URL + "image/food/" + imgNum + ".jpg"]
        },
        ratings: [],
        comments: []
    };
}

// Calculate average ratings from comments
function calculateRatingsFromComments(comments) {
    if (!comments || comments.length === 0) {
        return { price: 0, quality: 0, service: 0, space: 0 };
    }
    
    let price = 0, quality = 0, service = 0, space = 0;
    comments.forEach(c => {
        if (c.ratings) {
            price += c.ratings.price || 0;
            quality += c.ratings.quality || 0;
            service += c.ratings.service || 0;
            space += c.ratings.space || 0;
        }
    });
    
    const n = comments.length;
    return {
        price: price / n,
        quality: quality / n,
        service: service / n,
        space: space / n
    };
}

function avg(p) {
    let t = {price: 0, quality: 0, service: 0, space: 0};
    if (p.ratings && p.ratings.length > 0) {
        p.ratings.forEach(r => Object.keys(t).forEach(k => t[k] += r[k]));
        Object.keys(t).forEach(k => t[k] /= p.ratings.length);
    }
    return t;
}

function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('restaurantList');
    container.innerHTML = "";
    
    let placesToRender = [];
    
    // Only search SAMPLE_DATA (static data)
    placesToRender = SAMPLE_DATA
        .map(p => {
            let score = 0;
            if (p.name.toLowerCase().includes(q)) score += 10;
            // Get individual words from query for partial matching
            const queryWords = q.toLowerCase().split(/\s+/).filter(w => w.length > 1);
            p.tags.forEach(t => { 
                const tagLower = t.toLowerCase();
                if(q.includes(tagLower) || tagLower.includes(q) || queryWords.some(w => tagLower.includes(w))) score += 3; 
            });
            p.keywords.forEach(k => { 
                const kwLower = k.toLowerCase();
                if(q.includes(kwLower) || kwLower.includes(q) || queryWords.some(w => kwLower.includes(w))) score += 5; 
            });
            return { ...p, score };
        })
        .filter(p => p.score > 0)
        .sort((a, b) => b.score - a.score);
    
    placesToRender.forEach(p => {
        let a = {price: 0, quality: 0, service: 0, space: 0};
        let overall = "0.0";
        let commentCount = 0;
        
        if (backendPlaces.length > 0) {
            const backendPlace = backendPlaces.find(bp => bp.id === p.id);
            if (backendPlace) {
                overall = (backendPlace.overall_score || 0).toFixed(1);
                commentCount = backendPlace.total_reviews || 0;
                a = {
                    price: backendPlace.price_avg || 0,
                    quality: backendPlace.quality_avg || 0,
                    service: backendPlace.service_avg || 0,
                    space: backendPlace.space_avg || 0
                };
            }
        } else if (p.ratings && p.ratings.length > 0) {
            a = avg(p);
            overall = ((a.price + a.quality + a.service + a.space) / 4).toFixed(1);
            commentCount = p.comments.length;
        }
        
        container.innerHTML += `
            <div class="restaurant-card" onclick="openDetail(${p.id})">
                <img src="${p.photos.place[0]}" alt="${p.name}">
                <div class="restaurant-info">
                    <div class="restaurant-name">${p.name}</div>
                    <div class="restaurant-tags">
                        ${p.tags.slice(0, 3).map(t => `<span class="tag-badge ${t === 'Cơm' || t === 'Cafe' ? 'purple' : 'orange'}">${t}</span>`).join('')}
                    </div>
                    <div class="restaurant-rating">
                        <span class="rating-stars">⭐ ${overall}</span>
                        <span>${commentCount} bình luận</span>
                    </div>
                </div>
            </div>
        `;
    });
}

async function openDetail(id) {
    let p;
    
    const backendPlace = backendPlaces.find(x => x && x.id === id);
    if (backendPlace) {
        p = convertPlaceData(backendPlace);
        currentPlaceId = id;
        
        try {
            const response = await fetch(`/comment/list/${id}/`);
            if (response.ok) {
                const comments = await response.json();
                p.comments = comments;
                const ratings = calculateRatingsFromComments(comments);
                p.ratings = comments.map(c => c.ratings);
            }
        } catch (e) {
            console.log('Could not load comments');
        }
    } else {
        p = SAMPLE_DATA.find(x => x.id === id);
        currentPlaceId = id;
    }
    
    if (!p) return;
    
    const modal = document.getElementById('detailModal');
    let a = {price: 0, quality: 0, service: 0, space: 0};
    let overall = "0.0";
    
    if (backendPlace) {
        a = {
            price: backendPlace.price_avg || 0,
            quality: backendPlace.quality_avg || 0,
            service: backendPlace.service_avg || 0,
            space: backendPlace.space_avg || 0
        };
        overall = (backendPlace.overall_score || 0).toFixed(1);
    } else if (p.ratings && p.ratings.length > 0) {
        a = avg(p);
        overall = ((a.price + a.quality + a.service + a.space) / 4).toFixed(1);
    }
    
    document.getElementById('dName').innerText = p.name;
    document.getElementById('dMap').href = p.map || "https://maps.google.com";
    document.getElementById('dOverall').innerText = overall + "/10";
    document.getElementById('sPrice').innerText = a.price.toFixed(1);
    document.getElementById('sQuality').innerText = a.quality.toFixed(1);
    document.getElementById('sService').innerText = a.service.toFixed(1);
    document.getElementById('sSpace').innerText = a.space.toFixed(1);
    
    document.getElementById('dMain').src = p.photos.menu ? p.photos.menu[0] : p.photos.place[0];
    const gallery = document.getElementById('dGallery');
    gallery.innerHTML = "";
    // Show menu images in gallery (these can be clicked to zoom)
    const menuImages = p.photos.menu || p.photos.place;
    menuImages.forEach((img, idx) => {
        gallery.innerHTML += `<img src="${img}" onclick="zoomImage('${img}', '')" ${idx === 0 ? 'style="border-color:#6f42c1"' : ''}>`;
    });
    
    document.getElementById('commentCount').innerText = p.comments.length;
    renderComments(p.comments);
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function renderComments(comments) {
    const container = document.getElementById('commentList');
    if (!comments || comments.length === 0) {
        container.innerHTML = '<p style="color: #9ca3af; text-align: center; padding: 20px;">Chưa có bình luận nào</p>';
        return;
    }
    
    container.innerHTML = comments.map(c => {
        let imagesHtml = '';
        if (c.images && c.images.length > 0) {
            imagesHtml = `<div class="comment-images">${c.images.map(img => `<img src="${img}" onclick="zoomImage('${img}')">`).join('')}</div>`;
        }
        
        const date = c.created_at ? new Date(c.created_at).toLocaleDateString('vi-VN') : '';
        const scores = c.ratings || {price: c.price || 0, quality: c.quality || 0, service: c.service || 0, space: c.space || 0};
        
        return `
            <div class="comment-item">
                <div class="comment-header">
                    <span class="comment-user">${c.user}</span>
                    <span class="comment-date">${date}</span>
                </div>
                <div class="comment-content">${c.content}</div>
                <div class="comment-scores">
                    <span class="comment-score">💰 ${scores.price}</span>
                    <span class="comment-score">🍽️ ${scores.quality}</span>
                    <span class="comment-score">👨‍🍳 ${scores.service}</span>
                    <span class="comment-score">🏠 ${scores.space}</span>
                </div>
                ${imagesHtml}
            </div>
        `;
    }).join('');
}

function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
    document.body.style.overflow = '';
    document.getElementById('reviewForm').classList.remove('active');
}

function toggleReviewForm() {
    document.getElementById('reviewForm').classList.toggle('active');
}

function updateSlider(type) {
    const val = document.getElementById('c' + type).value;
    document.getElementById('slider' + type).innerText = val;
}

function zoomImage(img, menuImg) {
    // Use menu image if available, otherwise use the clicked image
    // If menuImg is not provided, just use the clicked image (for comment images)
    const overlaySrc = menuImg && menuImg.trim() ? menuImg : img;
    document.getElementById('zoomImg').src = overlaySrc + '?v=' + Date.now();
    document.getElementById('zoomOverlay').classList.add('active');
}

function closeZoom() {
    document.getElementById('zoomOverlay').classList.remove('active');
}

function getCsrfToken() {
    const name = 'csrftoken';
    const value = `; ${document.cookie}`.split(`; ${name}=`)[1].split(';')[0];
    return value;
}

function submitComment() {
    const fd = new FormData();
    fd.append("csrfmiddlewaretoken", getCsrfToken());
    fd.append("display_name", document.getElementById("cName").value || "Ẩn danh");
    fd.append("content", document.getElementById("cText").value);
    fd.append("price", document.getElementById("cPrice").value);
    fd.append("quality", document.getElementById("cQuality").value);
    fd.append("service", document.getElementById("cService").value);
    fd.append("space", document.getElementById("cSpace").value);
    fd.append("is_anonymous", document.getElementById("cAnon").checked);

    const imgFiles = document.getElementById("cImages").files;
    for(let i=0; i<imgFiles.length; i++){
        fd.append("images", imgFiles[i]);
    }

    fetch(`/comment/${currentPlaceId}/`, {
        method: "POST",
        body: fd
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            alert("Đã gửi bình luận!");
            document.getElementById("cName").value = "";
            document.getElementById("cText").value = "";
            document.getElementById("cImages").value = "";
            loadComments(currentPlaceId);
            render(); // Refresh the main grid to show updated ratings
            toggleReviewForm();
        } else {
            alert("Lỗi: " + (d.error || ""));
        }
    })
    .catch(() => {
        // Fallback: add comment locally
        const p = SAMPLE_DATA.find(x => x.id === currentPlaceId);
        const newComment = {
            user: document.getElementById("cName").value || "Ẩn danh",
            text: document.getElementById("cText").value,
            date: new Date().toISOString().split('T')[0],
            scores: {
                price: parseInt(document.getElementById("cPrice").value),
                quality: parseInt(document.getElementById("cQuality").value),
                service: parseInt(document.getElementById("cService").value),
                space: parseInt(document.getElementById("cSpace").value)
            },
            ratings: {
                price: parseInt(document.getElementById("cPrice").value),
                quality: parseInt(document.getElementById("cQuality").value),
                service: parseInt(document.getElementById("cService").value),
                space: parseInt(document.getElementById("cSpace").value)
            },
            images: [],
            content: document.getElementById("cText").value
        };
        if (p) {
            if (!p.comments) p.comments = [];
            p.comments.unshift(newComment);
        }
        renderComments(p ? p.comments : [newComment]);
        document.getElementById('commentCount').innerText = p ? p.comments.length : 1;
        alert("Đã gửi bình luận!");
        document.getElementById("cName").value = "";
        document.getElementById("cText").value = "";
        document.getElementById("cImages").value = "";
        toggleReviewForm();
    });
}

function loadComments(placeId) {
    fetch(`/comment/list/${placeId}/`)
    .then(r => r.json())
    .then(data => {
        if (backendPlaces.length > 0) {
            const backendPlace = backendPlaces.find(x => x.id === placeId);
            if (backendPlace) {
                const ratings = calculateRatingsFromComments(data);
                backendPlace.total_reviews = data.length;
                backendPlace.price_avg = ratings.price;
                backendPlace.quality_avg = ratings.quality;
                backendPlace.service_avg = ratings.service;
                backendPlace.space_avg = ratings.space;
                backendPlace.overall_score = (ratings.price + ratings.quality + ratings.service + ratings.space) / 4;
            }
        }
        renderComments(data);
        document.getElementById('commentCount').innerText = data.length;
    })
    .catch(() => {});
}

// Close modal on overlay click
document.getElementById('detailModal').onclick = function(e) {
    if (e.target === this) closeModal();
};

// Search listener
document.getElementById('search').oninput = render;

// Load data and initial render
async function init() {
    await loadPlacesFromAPI();
    render();
}

init();
</script>
