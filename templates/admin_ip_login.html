{% extends "base.html" %}
{% block content %}
<style>
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    background: #0d0f14;
  }
  .login-box {
    background: #161a23;
    border: 1px solid #2a3145;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-icon { font-size: 40px; margin-bottom: 12px; }
  .login-title {
    font-size: 18px;
    font-weight: 700;
    color: #e8eaf0;
    margin-bottom: 6px;
  }
  .login-sub { font-size: 12px; color: #4a5568; margin-bottom: 28px; }
  .login-input {
    width: 100%;
    background: #1e2433;
    border: 1px solid #2a3145;
    border-radius: 10px;
    color: #e8eaf0;
    font-family: inherit;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: #4f8ef7; }
  .login-btn {
    width: 100%;
    padding: 12px;
    background: #4f8ef7;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
</style>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-icon">🛡️</div>
    <div class="login-title">Admin IP Manager</div>
    <div class="login-sub">FPT Guide — Nhập mật khẩu để tiếp tục</div>
    <form method="post">
      {% csrf_token %}
      <input type="password" name="admin_key" class="login-input" placeholder="••••••••" autofocus>
      <button type="submit" class="login-btn">Đăng nhập</button>
    </form>
  </div>
</div>
{% endblock %}
