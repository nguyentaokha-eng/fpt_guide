<style>
.navbar {
    background: transparent !important;
}
    
.premium-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: linear-gradient(
        135deg,
        rgba(46, 163, 255, 0.25),
        rgba(255, 255, 255, 0.3),
        rgba(138, 43, 255, 0.25)
    );
}
.mesh-layer {
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 30px 30px;
}
.vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.05) 100%); }

.star-dot {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.9);
    animation: twinkle 1.5s ease-in-out infinite;
}

.star-dot:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
.star-dot:nth-child(2) { top: 15%; right: 8%; animation-delay: 0.3s; }
.star-dot:nth-child(3) { top: 30%; left: 12%; animation-delay: 0.6s; }
.star-dot:nth-child(4) { bottom: 25%; left: 8%; animation-delay: 0.9s; }
.star-dot:nth-child(5) { bottom: 30%; right: 10%; animation-delay: 1.2s; }
.star-dot:nth-child(6) { top: 50%; left: 3%; animation-delay: 0.4s; }
.star-dot:nth-child(7) { top: 20%; left: 25%; animation-delay: 0.7s; }
.star-dot:nth-child(8) { bottom: 15%; right: 25%; animation-delay: 1.1s; }

@keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
}
</style>

// ============================================================
//  SEARCH ENGINE
// ============================================================

function norm(str) {
    return str
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd').replace(/Đ/g, 'D')
        .toLowerCase().trim();
}

const preparedClubs = clubData.map(club => ({
    ...club,
    _nName:        norm(club.name),
    _nShort:       norm(club.short),
    _nTags:        club.tags.map(norm),
    _nKeywords:    club.keywords.map(norm),
    _origKeywords: club.keywords,
    _origTags:     club.tags,
}));

function tokenize(rawQuery) {
    let q = norm(rawQuery);
    q = q.replace(/\bcau lac bo\b/g, ' ');
    q = q.replace(/\bclb\b/g, ' ');
    q = q.replace(/\bnhom\b/g, ' ');
    q = q.replace(/\bteam\b/g, ' ');
    return q.split(/\s+/).filter(t => t.length >= 1);
}

function getNgrams(tokens, n) {
    const ngrams = [];
    for (let i = 0; i <= tokens.length - n; i++) {
        ngrams.push(tokens.slice(i, i + n).join(' '));
    }
    return ngrams;
}

function scoreClub(club, phrase) {
    if (club._nName === phrase)                  return 40;
    if (club._nShort === phrase)                 return 30;
    if (club._nTags.some(t => t === phrase))     return 20;
    if (club._nKeywords.some(k => k === phrase)) return 10;
    return 0;
}

function candidateSearch(rawQuery, pool) {
    const tokens = tokenize(rawQuery);
    if (tokens.length === 0) return [];

    const searchSyllables = new Set(tokens);
    const candidateMap = {};

    pool.forEach(club => {
        club._nKeywords.forEach((nk, i) => {
            const kwSyllables = nk.split(/\s+/);
            const matched = kwSyllables.some(ks => searchSyllables.has(ks));
            if (matched) {
                if (!candidateMap[nk]) {
                    candidateMap[nk] = {
                        candidateToken: club._origKeywords[i],
                        candidateNorm:  nk,
                        clubs: new Set(),
                    };
                }
                candidateMap[nk].clubs.add(club.short);
            }
        });

        club._nTags.forEach((nt, i) => {
            const tagSyllables = nt.split(/\s+/);
            const matched = tagSyllables.some(ts => searchSyllables.has(ts));
            if (matched) {
                if (!candidateMap[nt]) {
                    candidateMap[nt] = {
                        candidateToken: club._origTags[i],
                        candidateNorm:  nt,
                        clubs: new Set(),
                    };
                }
                candidateMap[nt].clubs.add(club.short);
            }
        });
    });

    return Object.values(candidateMap)
        .map(c => ({ ...c, matchCount: c.clubs.size, clubs: [...c.clubs] }))
        .sort((a, b) => b.matchCount - a.matchCount);
}

function ngramSearch(rawQuery, pool) {
    const tokens = tokenize(rawQuery);
    if (tokens.length === 0) return null;

    const maxN = Math.min(tokens.length, 5);

    for (let n = maxN; n >= 1; n--) {
        const phrases = getNgrams(tokens, n);
        const matched = [];

        pool.forEach(club => {
            let total = 0;
            phrases.forEach(phrase => { total += scoreClub(club, phrase); });
            if (total > 0) matched.push({ ...club, score: total });
        });

        if (matched.length > 0) {
            return { type: 'results', data: matched.sort((a, b) => b.score - a.score) };
        }
    }

    const candidates = candidateSearch(rawQuery, pool);
    if (candidates.length > 0) {
        return { type: 'candidates', data: candidates };
    }

    return { type: 'empty' };
}

const track          = document.getElementById('club-track');
const slider         = document.getElementById('club-slider');
const searchInput    = document.getElementById('smartSearch');
const searchFeedback = document.getElementById('searchFeedback');
const doubtUI        = document.getElementById('doubt-ui');
const doubtButtons   = document.getElementById('doubt-buttons');

let x = 0, speed = 0.8, isPaused = false, isDown = false, startX, singleSetWidth = 0, activeFilters = ['all'];

function hideDoubt() {
    doubtUI.style.display = 'none';
    doubtButtons.innerHTML = '';
}

function handleNoneMatch() {
    hideDoubt();
    searchInput.value = '';
    track.innerHTML = '<h3 style="color:#1A1A1A; width:100vw; text-align:center; padding:50px;">Hiện không có Clubs phù hợp với bạn, hãy thử lại với mô tả khác 🙏</h3>';
    searchFeedback.innerText = 'Hãy thử mô tả theo cách khác nhé!';
}

function showDoubt(candidates) {
    doubtButtons.innerHTML = '';

    candidates.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'doubt-btn';
        btn.innerHTML = `${c.candidateToken} <span class="match-count">${c.matchCount} CLB</span>`;
        btn.onclick = () => {
            searchInput.value = c.candidateToken;
            hideDoubt();
            render();
        };
        doubtButtons.appendChild(btn);
    });

    const noneWrapper = document.createElement('div');
    noneWrapper.style.cssText = 'margin-top: 16px; text-align: center; width: 100%;';
    noneWrapper.innerHTML = `<button class="doubt-none-btn" onclick="handleNoneMatch()">Không phải</button>`;
    doubtButtons.appendChild(noneWrapper);

    doubtUI.style.display = 'block';
}

        { border: '#6fffe9', title: '#6fffe9', tags: '#6fffe9', bg: '#0f0f1a' },
        { border: '#ffd166', title: '#ffd166', tags: '#ffd166', bg: '#0f0f1a' },
        { border: '#ff3c38', title: '#ff3c38', tags: '#ff3c38', bg: '#0f0f1a' },
        { border: '#2cff88', title: '#2cff88', tags: '#2cff88', bg: '#0f0f1a' },
        { border: '#ff7a2f', title: '#ff7a2f', tags: '#ff7a2f', bg: '#0f0f1a' },
        { border: '#3db2ff', title: '#2b7bbf', tags: '#3db2ff', bg: '#0f0f1a' },
        { border: '#ff8c32', title: '#ff8c32', tags: '#ff8c32', bg: '#0f0f1a' },
        { border: '#6ed4c7', title: '#4ecdc4', tags: '#6ed4c7', bg: '#0f0f1a' },
        { border: '#ff9f1c', title: '#ff9f1c', tags: '#ff9f1c', bg: '#0f0f1a' },

        { border: '#f5c542', title: '#f5c542', tags: '#f5c542', bg: '#0f0f1a' },
        { border: '#d52bff', title: '#d52bff', tags: '#d52bff', bg: '#0f0f1a' },
        { border: '#ff7a18', title: '#ff7a18', tags: '#ff7a18', bg: '#0f0f1a' },
        { border: '#ffe066', title: '#ffe066', tags: '#ffe066', bg: '#0f0f1a' },
        { border: '#4cd964', title: '#2bb84f', tags: '#4cd964', bg: '#0f0f1a' }

    const cardHtml = filtered.map((club) => {
        const originalIndex = clubData.findIndex(c => c.short === club.short);

function render() {
    track.innerHTML = '';
    hideDoubt();

    const rawQuery = searchInput.value.trim();

    const pool = activeFilters.includes('all')
        ? preparedClubs
        : preparedClubs.filter(c => activeFilters.every(f => c.tags.includes(f)));

    if (rawQuery === '') {
        searchFeedback.innerText = 'Nhập sở thích để nhận gợi ý phù hợp ✨';
        renderCards(pool);
        return;
    }

    const result = ngramSearch(rawQuery, pool);

    if (result === null) {
        searchFeedback.innerText = 'Nhập sở thích để nhận gợi ý phù hợp ✨';
        renderCards(pool);
        return;
    }

    if (result.type === 'results') {
        searchFeedback.innerText = `Tìm thấy ${result.data.length} CLB khớp với bạn!`;
        renderCards(result.data);
        return;
    }

    if (result.type === 'candidates') {
        searchFeedback.innerText = 'Không tìm thấy kết quả chính xác...';
        showDoubt(result.data);
        track.innerHTML = '';
        return;
    }

    // type === 'empty'
    searchFeedback.innerText = 'Không tìm thấy kết quả, hãy thử mô tả khác nhé!';
    track.innerHTML = '<h3 style="color:#fff; width:100vw; text-align:center; padding:50px;">Dữ liệu đang được cập nhật...</h3>';
}

// SỰ KIỆN TÌM KIẾM
searchInput.addEventListener('input', () => {
    if (searchInput.value !== '') {
        activeFilters = ['all'];
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-filter="all"]').classList.add('active');
    }
    render();
});

// SỰ KIỆN FILTER BUTTONS
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = function() {
        searchInput.value = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        activeFilters = [this.dataset.filter];
        render();
    };
});

// LOGIC TỰ ĐỘNG CHẠY (INFINITE LOOP)
function step() {
    if (!isDown && !isPaused && singleSetWidth > 0) {
        x -= speed;
        if (Math.abs(x) >= singleSetWidth) {
            x = 0;
        }
        track.style.transform = `translateX(${x}px)`;
    }
    requestAnimationFrame(step);
}

// SỰ KIỆN KÉO CHUỘT / VUỐT TAY
const start = (e) => {
    isDown = true;
    isPaused = true;
    startX = (e.pageX || e.touches[0].pageX) - x;
    track.style.cursor = 'grabbing';
};

const move = (e) => {
    if (!isDown) return;
    const currentX = (e.pageX || e.touches[0].pageX);
    x = currentX - startX;
    if (x > 0) x = -singleSetWidth;
    if (Math.abs(x) >= singleSetWidth) x = 0;
    track.style.transform = `translateX(${x}px)`;
};

const end = () => {
    isDown = false;
    isPaused = false;
    track.style.cursor = 'grab';
};

slider.addEventListener('mousedown', start);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
slider.addEventListener('touchstart', start, {passive: true});
window.addEventListener('touchmove', (e) => { if (isDown) move(e); }, {passive: true});
window.addEventListener('touchend', end);

render();
step();
</script>
